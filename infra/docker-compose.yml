services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-changeme}
      MYSQL_DATABASE: ${DB_NAME:-integratedrecsys}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # 将旧库 SQL 放入此目录可在首次启动自动导入
      - ./mysql/init:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ../backend
    env_file:
      - ../backend/.env
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
    depends_on:
      - mysql
      - redis
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ../frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  redis_data:
